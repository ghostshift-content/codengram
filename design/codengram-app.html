<!-- Codengram — full app prototype on the "Organic" Claude Design system. Recon only: maps a codebase's
     structure (features, interfaces, identity, data flows, coverage). Never reports vulnerabilities. -->
<title>Codengram — App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --color-bg:#f5ead8; --color-surface:#ebddc5; --color-text:#201e1d;
    --color-accent:#c67139; --color-accent-2:#7a8a5e; --color-divider:color-mix(in srgb,#201e1d 16%,transparent);
    --color-neutral-100:#f9f4ed; --color-neutral-200:#eee7db; --color-neutral-300:#dcd3c4; --color-neutral-400:#c0b6a5;
    --color-neutral-500:#a19786; --color-neutral-600:#82796a; --color-neutral-700:#645c50; --color-neutral-800:#474238; --color-neutral-900:#2e2b25;
    --color-accent-100:#fff2eb; --color-accent-200:#ffe1d0; --color-accent-300:#ffc6a5; --color-accent-400:#f6a06b; --color-accent-500:#d67f48;
    --color-accent-600:#b2622d; --color-accent-700:#8c491a; --color-accent-800:#643312; --color-accent-900:#402310;
    --color-accent-2-100:#f0fae1; --color-accent-2-200:#e1eecc; --color-accent-2-300:#ccdbb2; --color-accent-2-400:#aebf92; --color-accent-2-500:#8fa073;
    --color-accent-2-600:#728157; --color-accent-2-700:#56633f; --color-accent-2-800:#3d472b; --color-accent-2-900:#272e1b;
    --font-heading:"Caprasimo",Georgia,serif; --font-body:"Figtree",system-ui,-apple-system,"Segoe UI",sans-serif; --font-mono:ui-monospace,"SF Mono",Menlo,monospace;
    --space-1:4.4px; --space-2:8.8px; --space-3:13.2px; --space-4:17.6px; --space-6:26.4px; --space-8:35.2px;
    --radius-sm:8px; --radius-md:16px; --radius-lg:28px;
    --shadow-sm:0 1px 2px color-mix(in srgb,#2e2b25 14%,transparent); --shadow-md:0 3px 10px color-mix(in srgb,#2e2b25 16%,transparent); --shadow-lg:0 12px 32px color-mix(in srgb,#2e2b25 22%,transparent);
    --ok:var(--color-accent-2-600); --active:var(--color-accent-600); --gap:#c98a2f; --stale:var(--color-neutral-500); color-scheme:light;
  }
  :root[data-theme="dark"]{ --color-bg:#211b15; --color-surface:#2b241c; --color-text:#f3e9d9; --color-divider:color-mix(in srgb,#f3e9d9 15%,transparent);
    --color-accent:#e08a4c; --color-accent-2:#a8b884; --ok:var(--color-accent-2-400); --active:var(--color-accent-400); --gap:#e0a94e;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 4px 14px rgba(0,0,0,.45); --shadow-lg:0 16px 40px rgba(0,0,0,.55); color-scheme:dark; }
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]){ --color-bg:#211b15; --color-surface:#2b241c; --color-text:#f3e9d9;
    --color-divider:color-mix(in srgb,#f3e9d9 15%,transparent); --color-accent:#e08a4c; --color-accent-2:#a8b884; --ok:var(--color-accent-2-400);
    --active:var(--color-accent-400); --gap:#e0a94e; --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 4px 14px rgba(0,0,0,.45); --shadow-lg:0 16px 40px rgba(0,0,0,.55); color-scheme:dark; } }

  *,*::before,*::after{box-sizing:border-box;} html,body{height:100%;}
  body{margin:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,h4{font-family:var(--font-heading);font-weight:400;line-height:1.14;letter-spacing:-.015em;margin:0;text-wrap:balance;}
  .mono{font-family:var(--font-mono);} .nums{font-variant-numeric:tabular-nums;} .muted{color:color-mix(in srgb,var(--color-text) 55%,transparent);}
  a{color:var(--color-accent);} :focus-visible{outline:2px solid var(--color-accent);outline-offset:2px;} ::selection{background:color-mix(in srgb,var(--color-accent) 30%,transparent);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;text-decoration:none;font-family:var(--font-heading);font-size:13px;color:var(--color-text);background:transparent;border:1px solid transparent;padding:7px 13px;border-radius:999px;}
  .btn-primary{background:var(--color-accent);color:var(--color-bg);} .btn-primary:hover{background:var(--color-accent-600);}
  .btn-secondary{border-color:var(--color-divider);} .btn-secondary:hover{background:color-mix(in srgb,var(--color-text) 7%,transparent);}
  .btn-icon{width:34px;height:34px;padding:0;} .btn-block{width:100%;}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:999px;white-space:nowrap;}
  .tag-accent{background:var(--color-accent-100);color:var(--color-accent-800);} .tag-accent-2{background:var(--color-accent-2-100);color:var(--color-accent-2-800);}
  .tag-neutral{background:var(--color-neutral-100);color:var(--color-neutral-800);} .tag-outline{border:1px solid var(--color-accent);color:var(--color-accent);}
  :root[data-theme="dark"] .tag-accent{background:color-mix(in srgb,var(--color-accent) 22%,transparent);color:var(--color-accent-200);}
  :root[data-theme="dark"] .tag-accent-2{background:color-mix(in srgb,var(--color-accent-2) 22%,transparent);color:var(--color-accent-2-200);}
  :root[data-theme="dark"] .tag-neutral{background:color-mix(in srgb,var(--color-text) 12%,transparent);color:var(--color-text);}
  .input{min-height:34px;padding:6px 14px;font:inherit;font-size:13px;color:var(--color-text);background:var(--color-surface);border:1px solid var(--color-divider);border-radius:999px;width:100%;}
  .card{background:var(--color-surface);border-radius:var(--radius-lg);padding:var(--space-4);}
  .table{width:100%;border-collapse:collapse;font-size:13.5px;}
  .table th{text-align:left;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:color-mix(in srgb,var(--color-text) 58%,transparent);padding:9px 12px;border-bottom:1px solid var(--color-divider);position:sticky;top:0;background:var(--color-surface);}
  .table td{padding:10px 12px;border-bottom:1px solid color-mix(in srgb,var(--color-text) 8%,transparent);vertical-align:middle;}
  .table tbody tr:hover{background:color-mix(in srgb,var(--color-text) 4%,transparent);cursor:pointer;}

  /* shell */
  .app{display:grid;height:100vh;grid-template-rows:56px 1fr 46px;grid-template-columns:224px 1fr;grid-template-areas:"top top" "rail main" "strip strip";}
  .topbar{grid-area:top;display:flex;align-items:center;gap:var(--space-3);padding:0 var(--space-4);background:var(--color-surface);border-bottom:1px solid var(--color-divider);z-index:5;}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--font-heading);font-size:19px;letter-spacing:-.02em;}
  .switcher{display:flex;align-items:center;gap:7px;padding:5px 8px 5px 12px;background:var(--color-bg);border:1px solid var(--color-divider);border-radius:999px;font-size:13px;cursor:pointer;}
  .switcher b{font-family:var(--font-heading);font-weight:400;} .search{position:relative;flex:1;max-width:400px;} .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5;} .search .input{padding-left:36px;}
  .spacer{flex:1;} .recon-pill{display:inline-flex;align-items:center;gap:8px;padding:5px 12px 5px 10px;border-radius:999px;font-size:12px;background:color-mix(in srgb,var(--color-accent) 12%,transparent);color:var(--color-accent-800);}
  :root[data-theme="dark"] .recon-pill{color:var(--color-accent-200);}
  .rdot{width:8px;height:8px;border-radius:50%;background:var(--active);animation:pulse 2s infinite;} @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--active) 55%,transparent);}70%{box-shadow:0 0 0 7px transparent;}100%{box-shadow:0 0 0 0 transparent;}}
  .rail{grid-area:rail;background:var(--color-surface);border-right:1px solid var(--color-divider);padding:var(--space-3) var(--space-2);display:flex;flex-direction:column;gap:2px;overflow:auto;}
  .navitem{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:999px;cursor:pointer;font-size:14px;color:var(--color-text);}
  .navitem svg{opacity:.72;flex:none;} .navitem .cnt{margin-left:auto;font-size:11px;color:color-mix(in srgb,var(--color-text) 45%,transparent);}
  .navitem:hover{background:color-mix(in srgb,var(--color-text) 6%,transparent);}
  .navitem[aria-current="page"]{background:var(--color-accent);color:var(--color-bg);} .navitem[aria-current="page"] svg{opacity:1;} .navitem[aria-current="page"] .cnt{color:color-mix(in srgb,var(--color-bg) 80%,transparent);}
  .main{grid-area:main;overflow:auto;position:relative;} .view{display:none;} .view.on{display:block;}
  .vhead{display:flex;align-items:flex-end;gap:var(--space-3);padding:var(--space-6) var(--space-6) var(--space-3);}
  .vhead h1{font-size:30px;} .vhead .sub{font-size:13px;} .vbody{padding:0 var(--space-6) var(--space-8);}
  .stats{display:flex;gap:var(--space-3);flex-wrap:wrap;margin-bottom:var(--space-4);}
  .stat{background:var(--color-surface);border-radius:var(--radius-lg);padding:14px 18px;min-width:120px;}
  .stat .n{font-family:var(--font-heading);font-size:28px;line-height:1;} .stat .l{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:color-mix(in srgb,var(--color-text) 52%,transparent);margin-top:6px;}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:var(--space-3);flex-wrap:wrap;}
  .chip{font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid var(--color-divider);cursor:pointer;background:var(--color-surface);}
  .chip[aria-pressed="true"]{background:var(--color-accent);color:var(--color-bg);border-color:transparent;}
  .cov{display:inline-flex;align-items:center;gap:6px;font-size:12px;} .covdot{width:9px;height:9px;border-radius:50%;flex:none;}
  .tablewrap{background:var(--color-surface);border-radius:var(--radius-lg);overflow:auto;max-height:calc(100vh - 340px);}
  .cite{font-family:var(--font-mono);font-size:11.5px;color:color-mix(in srgb,var(--color-text) 60%,transparent);}
  .prov{font-size:9px;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:999px;}
  .prov.high{background:var(--color-accent-2-100);color:var(--color-accent-2-800);} .prov.med{background:var(--color-accent-100);color:var(--color-accent-800);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);} .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-3);}
  @media (max-width:980px){.grid2,.grid3{grid-template-columns:1fr;}}
  .h4lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:color-mix(in srgb,var(--color-text) 55%,transparent);margin-bottom:10px;}

  /* strip */
  .strip{grid-area:strip;display:flex;align-items:center;gap:var(--space-4);padding:0 var(--space-4);background:var(--color-surface);border-top:1px solid var(--color-divider);font-size:12px;overflow:hidden;}
  .strip .seg{display:flex;align-items:center;gap:8px;white-space:nowrap;} .strip .sep{width:1px;height:20px;background:var(--color-divider);}
  .worker{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;background:var(--color-bg);border:1px solid var(--color-divider);} .wk-dot{width:7px;height:7px;border-radius:50%;}
  .bar{height:6px;width:110px;border-radius:999px;background:color-mix(in srgb,var(--color-text) 12%,transparent);overflow:hidden;} .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--color-accent),var(--color-accent-2));}
  .ticker{flex:1;overflow:hidden;} .ticker .ev{color:color-mix(in srgb,var(--color-text) 62%,transparent);} .ev .mono{color:var(--color-accent);}

  /* brain */
  .brain{position:absolute;inset:0;overflow:hidden;background:radial-gradient(120% 120% at 30% 0%,color-mix(in srgb,var(--color-accent) 6%,transparent),transparent 55%),radial-gradient(100% 100% at 90% 100%,color-mix(in srgb,var(--color-accent-2) 7%,transparent),transparent 50%),var(--color-bg);}
  #net{position:absolute;inset:0;width:100%;height:100%;} .node text{font-family:var(--font-heading);pointer-events:none;fill:var(--color-text);} .node{cursor:pointer;}
  .legend{position:absolute;right:18px;bottom:18px;background:color-mix(in srgb,var(--color-surface) 88%,transparent);backdrop-filter:blur(4px);border:1px solid var(--color-divider);border-radius:var(--radius-md);padding:11px 13px;font-size:11px;}
  .legend .row{display:flex;align-items:center;gap:8px;padding:2px 0;} .legend .sw{width:11px;height:11px;border-radius:50%;flex:none;}
  .tt{position:absolute;pointer-events:none;background:var(--color-neutral-900);color:var(--color-neutral-100);font-size:12px;padding:5px 9px;border-radius:8px;opacity:0;transform:translate(-50%,-140%);transition:opacity .12s;z-index:6;white-space:nowrap;}
  .brainInsp{position:absolute;right:18px;top:18px;width:296px;max-height:calc(100% - 120px);overflow:auto;background:color-mix(in srgb,var(--color-surface) 94%,transparent);backdrop-filter:blur(6px);border:1px solid var(--color-divider);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-md);}

  /* coverage matrix heatmap */
  .matrix{display:grid;gap:3px;font-size:11px;} .cell{height:26px;border-radius:6px;display:grid;place-items:center;font-size:9px;color:var(--color-bg);cursor:pointer;}
  .m0{background:var(--color-neutral-300);color:var(--color-text);} .m1{background:var(--color-accent-2-500);} .m2{background:var(--color-accent-500);} .m3{background:var(--gap);} .m4{background:var(--color-neutral-500);}
  .rowlbl{font-size:11px;display:flex;align-items:center;padding-right:8px;} .collbl{font-size:10px;color:color-mix(in srgb,var(--color-text) 55%,transparent);writing-mode:vertical-rl;text-align:end;height:70px;}

  /* timeline */
  .tl{position:relative;padding-left:26px;} .tl::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--color-divider);}
  .tl .it{position:relative;padding:10px 0;} .tl .it::before{content:"";position:absolute;left:-22px;top:14px;width:12px;height:12px;border-radius:50%;background:var(--color-accent);border:2px solid var(--color-bg);}
  .tl .it.ok::before{background:var(--ok);} .tl .it.gap::before{background:var(--gap);} .tl .t{font-size:11px;color:color-mix(in srgb,var(--color-text) 50%,transparent);} .mono2{font-family:var(--font-mono);font-size:11px;}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>

<div class="app">
  <header class="topbar">

<script>
(() => {
  const root=document.documentElement, C=v=>getComputedStyle(root).getPropertyValue(v).trim();
  document.getElementById('themeBtn').onclick=()=>{ const dark=root.getAttribute('data-theme')==='dark'||(root.getAttribute('data-theme')!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches); root.setAttribute('data-theme',dark?'light':'dark'); if(current==='brain') drawBrain(); };
  const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

  // nav
  const ic={brain:'<circle cx="12" cy="12" r="3"/><circle cx="5" cy="6" r="1.6"/><circle cx="19" cy="6" r="1.6"/><circle cx="5" cy="18" r="1.6"/><circle cx="19" cy="18" r="1.6"/><path d="m9.7 10.4-3-3M14.3 10.4l3-3M9.7 13.6l-3 3M14.3 13.6l3 3"/>',
    features:'<rect x="3" y="4" width="18" height="4" rx="1.5"/><rect x="3" y="10" width="18" height="4" rx="1.5"/><rect x="3" y="16" width="18" height="4" rx="1.5"/>',
    architecture:'<rect x="4" y="4" width="6" height="6" rx="1.5"/><rect x="14" y="4" width="6" height="6" rx="1.5"/><rect x="9" y="14" width="6" height="6" rx="1.5"/><path d="M7 10v2h10v-2M12 12v2"/>',
    identity:'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>',
    interfaces:'<path d="M4 7h16M4 12h16M4 17h10"/><circle cx="19" cy="17" r="2"/>',
    dataflows:'<path d="M3 6h5l2 3h11"/><path d="M3 6v12h18V9"/><path d="m14 13 3 3-3 3"/>',
    coverage:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M9 9v11"/>',
    activity:'<path d="M12 7v5l3 2"/><circle cx="12" cy="12" r="9"/>',
    exports:'<path d="M4 4h10l6 6v10H4z"/><path d="M14 4v6h6"/>'};
  const NAV=[['brain','Brain',''],['features','Features','42'],['architecture','Architecture',''],['identity','Identity','9'],['interfaces','Interfaces','188'],['dataflows','Data Flows',''],['coverage','Coverage','86%'],['activity','Activity',''],['exports','Exports','']];
  const rail=document.getElementById('rail');
  rail.innerHTML=NAV.map(([k,l,c])=>`<div class="navitem" data-v="${k}"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75">${ic[k]}</svg><span>${l}</span>${c?`<span class="cnt nums">${c}</span>`:''}</div>`).join('')
    +`<div style="margin-top:auto;padding:12px;"><div class="tag tag-accent-2" style="width:100%;justify-content:center;">Recon only · never security review</div></div>`;

  const cov=(k)=>({mapped:['var(--ok)','mapped'],mapping:['var(--active)','mapping'],gap:['var(--gap)','coverage gap'],shared:['var(--color-accent-2-400)','shared infra'],dead:['var(--stale)','dead code']}[k]||['var(--stale)',k]);
  const covTag=k=>{const[c,l]=cov(k);return `<span class="cov"><span class="covdot" style="background:${c}"></span>${l}</span>`;};

  // ── DATA (recon facts — structure, not vulnerabilities) ────────────────────────────────
  const FEATURES=[
    ['Checkout','Storefront',3,'guest, member','mapped','high','app/controllers/checkout_controller.rb'],
    ['Cart','Storefront',4,'guest, member','mapped','high','app/controllers/carts_controller.rb'],
    ['Catalog','Storefront',6,'guest','mapping','med','app/controllers/products_controller.rb'],
    ['OAuth sign-in','Identity',4,'guest → member','mapping','high','app/controllers/sessions_controller.rb'],
    ['Sessions','Identity',3,'member','mapped','high','app/controllers/sessions_controller.rb'],
    ['Roles & policies','Identity',2,'all','mapping','med','app/policies/'],
    ['Refunds','Payments',2,'staff, admin','mapped','high','app/services/payment_service.rb'],
    ['Payouts','Payments',3,'admin','gap','—','app/services/payouts/'],
    ['Webhooks','Payments',5,'system','mapping','med','app/controllers/webhooks_controller.rb'],

  // ── Brain view (rendered separately with the neural graph) ──────────────────────────────
  const NS='http://www.w3.org/2000/svg';
  const FAM={project:{c:'--color-neutral-800',r:24},domain:{c:'--color-neutral-700',r:17},feature:{c:'--color-accent',r:11}};
  const project={id:'p',type:'project',label:'acme-commerce',fam:'project'};
  const domains=[['d1','Storefront','mapping'],['d2','Identity','mapping'],['d3','Payments','mapping'],['d4','Admin','mapped'],['d5','Search','mapped'],['d6','Media','gap']].map(([id,label,status])=>({id,label,status,type:'domain',fam:'domain'}));
  const gfeatures=FEATURES.map((f,i)=>({id:'gf'+i,label:f[0],d:({Storefront:'d1',Identity:'d2',Payments:'d3',Admin:'d4',Search:'d5',Media:'d6'})[f[1]],status:f[4],type:'feature',fam:'feature'}));
  const gnodes=[project,...domains,...gfeatures], gedges=[]; domains.forEach(d=>gedges.push(['p',d.id])); gfeatures.forEach(f=>gedges.push([f.d,f.id]));
  let selected='gf3', hovered=null, gscale=1;
  function glayout(svg){ const W=svg.clientWidth,H=svg.clientHeight,cx=W/2,cy=H/2; project.x=cx;project.y=cy;
    const R1=Math.min(W,H)*0.19,R2=Math.min(W,H)*0.36;
    domains.forEach((d,i)=>{const a=-Math.PI/2+i/domains.length*Math.PI*2; d.x=cx+Math.cos(a)*R1; d.y=cy+Math.sin(a)*R1; d._a=a;});
    const by={}; gfeatures.forEach(f=>{(by[f.d]=by[f.d]||[]).push(f);});
    domains.forEach(d=>{const fs=by[d.id]||[]; fs.forEach((f,j)=>{const a=d._a+(fs.length>1?(j/(fs.length-1)-0.5)*0.6:0),rr=R2+(j%2?16:-6); f.x=cx+Math.cos(a)*rr; f.y=cy+Math.sin(a)*rr;});});
  }
  function ring(el,n){ if(n.status==='mapping'){el.setAttribute('stroke',C('--active'));el.setAttribute('stroke-width','2.5');el.setAttribute('stroke-dasharray','3 3');el.style.animation='spin 8s linear infinite';}
    else if(n.status==='gap'){el.setAttribute('stroke',C('--gap'));el.setAttribute('stroke-width','2');el.setAttribute('stroke-dasharray','4 4');}
    else{el.setAttribute('stroke','color-mix(in srgb,var(--color-text) 18%,transparent)');el.setAttribute('stroke-width','1');} }
  const neigh=id=>{const s=new Set([id]);gedges.forEach(([a,b])=>{if(a===id)s.add(b);if(b===id)s.add(a);});return s;};
  function drawBrain(){ const svg=document.getElementById('net'); if(!svg) return; glayout(svg); svg.innerHTML='';
    const st=document.createElementNS(NS,'style'); st.textContent='@keyframes spin{to{stroke-dashoffset:-24}}'; svg.appendChild(st);
    const g=document.createElementNS(NS,'g'); g.setAttribute('transform',`translate(${svg.clientWidth*(1-gscale)/2},${svg.clientHeight*(1-gscale)/2}) scale(${gscale})`); svg.appendChild(g);
    const hl=hovered?neigh(hovered):(selected?neigh(selected):null);
    gedges.forEach(([a,b])=>{const na=gnodes.find(n=>n.id===a),nb=gnodes.find(n=>n.id===b),mx=(na.x+nb.x)/2,my=(na.y+nb.y)/2,dx=nb.x-na.x,dy=nb.y-na.y;
      const p=document.createElementNS(NS,'path');p.setAttribute('d',`M${na.x} ${na.y} Q${mx-dy*0.12} ${my+dx*0.12} ${nb.x} ${nb.y}`);const on=hl?(hl.has(a)&&hl.has(b)):true;
      p.setAttribute('fill','none');p.setAttribute('stroke',on?C('--color-accent'):'color-mix(in srgb,var(--color-text) 14%,transparent)');p.setAttribute('stroke-width',on&&hl?1.6:1);p.setAttribute('opacity',hl&&!on?0.25:0.6);g.appendChild(p);});
    gnodes.forEach(n=>{const f=FAM[n.fam],gg=document.createElementNS(NS,'g');gg.setAttribute('class','node');gg.setAttribute('transform',`translate(${n.x} ${n.y})`);const dim=hl&&!hl.has(n.id);
      const c=document.createElementNS(NS,'circle');c.setAttribute('r',f.r);c.setAttribute('fill',C(f.c));c.setAttribute('opacity',dim?0.32:1);ring(c,n);
      if(n.id===selected){c.setAttribute('stroke',C('--color-accent'));c.setAttribute('stroke-width','3');c.style.animation='';}gg.appendChild(c);
      if(n.type!=='feature'||!dim){const t=document.createElementNS(NS,'text');t.setAttribute('text-anchor','middle');t.setAttribute('y',f.r+(n.type==='project'?18:14));t.setAttribute('font-size',n.type==='project'?15:n.type==='domain'?12:10.5);t.setAttribute('opacity',dim?0.4:0.9);t.textContent=n.label;gg.appendChild(t);}
      gg.onmouseenter=e=>{hovered=n.id;const tt=document.getElementById('tt');const b=svg.getBoundingClientRect();tt.style.left=(e.clientX-b.left)+'px';tt.style.top=(e.clientY-b.top)+'px';tt.textContent=n.label+(n.status?' · '+n.status:'');tt.style.opacity=1;drawBrain();};
      gg.onmouseleave=()=>{hovered=null;const tt=document.getElementById('tt');if(tt)tt.style.opacity=0;drawBrain();};
      gg.onclick=()=>{selected=n.id;brainInsp(n);drawBrain();};g.appendChild(gg);});
  }
  function brainInsp(n){ const el=document.getElementById('binsp'); if(!el) return;
    const isF=n.type==='feature', dom=isF?FEATURES.find(f=>f[0]===n.label):null;
    el.innerHTML=`<div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--color-accent)">${isF?'Feature · '+(dom?dom[1]:''):n.type==='domain'?'Domain':'Project · Rails 7'}</div>
      <h3 style="font-size:22px;margin:5px 0">${esc(n.label)}</h3>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0">${n.status?covTag(n.status).replace('cov','tag tag-'+(n.status==='gap'?'neutral':'accent')).replace(/<span class="covdot"[^>]*><\/span>/,''):''}<span class="tag tag-neutral">8f2c1a</span></div>
      ${isF?`<div class="h4lbl" style="margin-top:12px">Facts</div>
        <div style="font-size:13px"><div class="rel" style="padding:3px 0"><span class="muted" style="min-width:90px">Entry points</span>${dom[2]} routes</div><div class="rel" style="padding:3px 0"><span class="muted" style="min-width:90px">Roles</span>${dom[3]}</div><div class="rel" style="padding:3px 0"><span class="muted" style="min-width:90px">Coverage</span>${dom[4]}</div></div>
        <div class="h4lbl" style="margin-top:12px">Citations</div><div class="cite" style="background:var(--color-bg);border:1px solid var(--color-divider);border-radius:10px;padding:7px 10px">${esc(dom[6])} <span style="color:var(--color-accent)">· ${dom[5]}</span></div>`
        :`<p class="muted" style="font-size:13px">${n.type==='domain'?FEATURES.filter(f=>({Storefront:'d1',Identity:'d2',Payments:'d3',Admin:'d4',Search:'d5',Media:'d6'})[f[1]]===n.id).length+' features · click to expand its neighbourhood.':'6 domains · 42 features · 86% mapped · 1,204 files.'}</p>`}
      <button class="btn btn-primary btn-block" style="width:100%;margin-top:14px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75"><path d="M12 3a9 9 0 0 0-9 9c0 1.6.4 3 1.2 4.3L3 21l4.7-1.2A9 9 0 1 0 12 3Z"/></svg>Ask Claude about ${esc(n.label)}</button>`;
  }
  function brainView(){ return `<div class="brain"><svg id="net" aria-label="Neural map"></svg>
    <div class="legend"><div class="row"><span class="sw" style="background:var(--color-neutral-800)"></span>Project / domain</div><div class="row"><span class="sw" style="background:var(--color-accent)"></span>Feature</div><div class="row"><span class="sw" style="border:2px dashed var(--gap);width:9px;height:9px"></span>Coverage gap</div><div class="row"><span class="sw" style="box-shadow:0 0 0 2px var(--active);background:transparent"></span>Currently mapping</div></div>
    <div class="brainInsp" id="binsp"></div><div class="tt" id="tt"></div></div>`; }

  // ── Router ─────────────────────────────────────────────────────────────────────────────
  const main=document.getElementById('main'); let current='brain', ro=null;
  function go(v){ current=v; rail.querySelectorAll('.navitem').forEach(n=>n.toggleAttribute('aria-current',n.dataset.v===v)&&n.setAttribute('aria-current','page')); rail.querySelectorAll('.navitem').forEach(n=>{ if(n.dataset.v===v)n.setAttribute('aria-current','page'); else n.removeAttribute('aria-current'); });
    if(v==='brain'){ main.innerHTML=brainView(); const svg=document.getElementById('net'); const seed=gfeatures.find(f=>f.label==='OAuth sign-in'); selected=seed.id; brainInsp(seed); if(ro)ro.disconnect(); ro=new ResizeObserver(()=>drawBrain()); ro.observe(svg); requestAnimationFrame(drawBrain); }
    else { if(ro){ro.disconnect();ro=null;} main.innerHTML=`<div class="view on">${VIEWS[v]()}</div>`; main.scrollTop=0;
      main.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{ c.parentElement.querySelectorAll('.chip').forEach(x=>x.removeAttribute('aria-pressed')); c.setAttribute('aria-pressed','true'); }); }
  }
  rail.querySelectorAll('.navitem').forEach(n=>n.onclick=()=>go(n.dataset.v));
  go('brain');
})();
</script>
