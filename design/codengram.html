<!-- Codengram — ONE unified app: Projects → New → Live recon → inside the project (Brain + 8 views).
     Organic design system. Recon only: maps structure; never reports vulnerabilities. -->
<title>Codengram</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --color-bg:#f5ead8; --color-surface:#ebddc5; --color-text:#201e1d; --color-accent:#c67139; --color-accent-2:#7a8a5e;

    --color-neutral-500:#a19786; --color-neutral-600:#82796a; --color-neutral-700:#645c50; --color-neutral-800:#474238; --color-neutral-900:#2e2b25;
    --color-accent-100:#fff2eb; --color-accent-200:#ffe1d0; --color-accent-300:#ffc6a5; --color-accent-400:#f6a06b; --color-accent-500:#d67f48;
    --color-accent-600:#b2622d; --color-accent-700:#8c491a; --color-accent-800:#643312; --color-accent-900:#402310;
    --color-accent-2-100:#f0fae1; --color-accent-2-200:#e1eecc; --color-accent-2-300:#ccdbb2; --color-accent-2-400:#aebf92; --color-accent-2-500:#8fa073;
    --color-accent-2-600:#728157; --color-accent-2-700:#56633f; --color-accent-2-800:#3d472b; --color-accent-2-900:#272e1b;
    --font-heading:"Caprasimo",Georgia,serif; --font-body:"Figtree",system-ui,-apple-system,"Segoe UI",sans-serif; --font-mono:ui-monospace,"SF Mono",Menlo,monospace;
    --space-1:4.4px; --space-2:8.8px; --space-3:13.2px; --space-4:17.6px; --space-6:26.4px; --space-8:35.2px;
    --radius-md:16px; --radius-lg:28px;
    --shadow-sm:0 1px 2px color-mix(in srgb,#2e2b25 14%,transparent); --shadow-md:0 3px 10px color-mix(in srgb,#2e2b25 16%,transparent); --shadow-lg:0 12px 32px color-mix(in srgb,#2e2b25 22%,transparent);
    --ok:var(--color-accent-2-600); --active:var(--color-accent-600); --gap:#c98a2f; --stale:var(--color-neutral-500); color-scheme:light;
  }
  :root[data-theme="dark"]{ --color-bg:#211b15; --color-surface:#2b241c; --color-text:#f3e9d9; --color-divider:color-mix(in srgb,#f3e9d9 15%,transparent);
    --color-accent:#e08a4c; --color-accent-2:#a8b884; --ok:var(--color-accent-2-400); --active:var(--color-accent-400); --gap:#e0a94e;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 4px 14px rgba(0,0,0,.45); --shadow-lg:0 16px 40px rgba(0,0,0,.55); color-scheme:dark; }
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]){ --color-bg:#211b15; --color-surface:#2b241c; --color-text:#f3e9d9;
    --color-divider:color-mix(in srgb,#f3e9d9 15%,transparent); --color-accent:#e08a4c; --color-accent-2:#a8b884; --ok:var(--color-accent-2-400);
    --active:var(--color-accent-400); --gap:#e0a94e; --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 4px 14px rgba(0,0,0,.45); --shadow-lg:0 16px 40px rgba(0,0,0,.55); color-scheme:dark; } }

  *,*::before,*::after{box-sizing:border-box;} html,body{height:100%;}
  body{margin:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}

  .mono{font-family:var(--font-mono);} .nums{font-variant-numeric:tabular-nums;} .muted{color:color-mix(in srgb,var(--color-text) 55%,transparent);}
  a{color:var(--color-accent);} :focus-visible{outline:2px solid var(--color-accent);outline-offset:2px;} ::selection{background:color-mix(in srgb,var(--color-accent) 30%,transparent);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;text-decoration:none;font-family:var(--font-heading);font-size:14px;color:var(--color-text);background:transparent;border:1px solid transparent;padding:8px 15px;border-radius:999px;}
  .btn-primary{background:var(--color-accent);color:var(--color-bg);} .btn-primary:hover{background:var(--color-accent-600);} .btn-primary:disabled{opacity:.45;}
  .btn-secondary{border-color:var(--color-divider);} .btn-secondary:hover{background:color-mix(in srgb,var(--color-text) 7%,transparent);}
  .btn-lg{font-size:15px;padding:11px 22px;} .btn-block{width:100%;} .btn-icon{width:36px;height:36px;padding:0;} .btn-sm{font-size:13px;padding:6px 12px;}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:999px;white-space:nowrap;}
  .tag-accent{background:var(--color-accent-100);color:var(--color-accent-800);} .tag-accent-2{background:var(--color-accent-2-100);color:var(--color-accent-2-800);} .tag-neutral{background:var(--color-neutral-100);color:var(--color-neutral-800);} .tag-outline{border:1px solid var(--color-accent);color:var(--color-accent);}
  :root[data-theme="dark"] .tag-accent{background:color-mix(in srgb,var(--color-accent) 22%,transparent);color:var(--color-accent-200);}
  :root[data-theme="dark"] .tag-accent-2{background:color-mix(in srgb,var(--color-accent-2) 22%,transparent);color:var(--color-accent-2-200);}
  :root[data-theme="dark"] .tag-neutral{background:color-mix(in srgb,var(--color-text) 12%,transparent);color:var(--color-text);}
  .input{min-height:34px;padding:6px 14px;font:inherit;font-size:13px;color:var(--color-text);background:var(--color-surface);border:1px solid var(--color-divider);border-radius:999px;width:100%;}
  .input.big{min-height:44px;font-size:15px;padding:10px 16px;} .input.mono{font-family:var(--font-mono);font-size:13.5px;} .input:focus-visible{border-color:var(--color-accent);outline-offset:0;}
  .field label{display:block;font-size:12px;margin-bottom:6px;color:color-mix(in srgb,var(--color-text) 70%,transparent);}
  .card{background:var(--color-surface);border-radius:var(--radius-lg);padding:var(--space-4);}

  .seg button{border:0;background:transparent;color:var(--color-text);padding:8px 15px;cursor:pointer;font-family:var(--font-heading);font-size:13px;display:inline-flex;gap:7px;align-items:center;} .seg button[aria-pressed="true"]{background:var(--color-accent);color:var(--color-bg);}
  .table{width:100%;border-collapse:collapse;font-size:13.5px;}
  .table th{text-align:left;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:color-mix(in srgb,var(--color-text) 58%,transparent);padding:9px 12px;border-bottom:1px solid var(--color-divider);position:sticky;top:0;background:var(--color-surface);}
  .table td{padding:10px 12px;border-bottom:1px solid color-mix(in srgb,var(--color-text) 8%,transparent);vertical-align:middle;} .table tbody tr:hover{background:color-mix(in srgb,var(--color-text) 4%,transparent);cursor:pointer;}
  .h4lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:color-mix(in srgb,var(--color-text) 55%,transparent);margin-bottom:10px;}
  .cite{font-family:var(--font-mono);font-size:11.5px;color:color-mix(in srgb,var(--color-text) 60%,transparent);}
  .prov{font-size:9px;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:999px;} .prov.high{background:var(--color-accent-2-100);color:var(--color-accent-2-800);} .prov.med{background:var(--color-accent-100);color:var(--color-accent-800);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);} .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-3);} @media(max-width:980px){.grid2,.grid3{grid-template-columns:1fr;}}
  .rel{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0;} .spacer{flex:1;} .cov{display:inline-flex;align-items:center;gap:6px;font-size:12px;} .covdot{width:9px;height:9px;border-radius:50%;flex:none;}

  /* top bar (always) */
  .top{display:flex;align-items:center;gap:var(--space-3);padding:0 var(--space-4);height:56px;background:var(--color-surface);border-bottom:1px solid var(--color-divider);z-index:8;position:relative;}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--font-heading);font-size:19px;letter-spacing:-.02em;cursor:pointer;}
  .switcher{display:flex;align-items:center;gap:8px;padding:5px 9px 5px 13px;background:var(--color-bg);border:1px solid var(--color-divider);border-radius:999px;font-size:13px;cursor:pointer;position:relative;} .switcher b{font-family:var(--font-heading);font-weight:400;}
  .search{position:relative;flex:1;max-width:380px;} .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5;} .search .input{padding-left:36px;}
  .recon-pill{display:inline-flex;align-items:center;gap:8px;padding:5px 12px 5px 10px;border-radius:999px;font-size:12px;background:color-mix(in srgb,var(--color-accent) 12%,transparent);color:var(--color-accent-800);cursor:pointer;} :root[data-theme="dark"] .recon-pill{color:var(--color-accent-200);}
  .rdot{width:8px;height:8px;border-radius:50%;background:var(--active);animation:pulse 2s infinite;} @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--active) 55%,transparent);}70%{box-shadow:0 0 0 7px transparent;}100%{box-shadow:0 0 0 0 transparent;}}

  .conn.out{background:color-mix(in srgb,var(--gap) 18%,transparent);color:var(--color-accent-800);cursor:pointer;} :root[data-theme="dark"] .conn.out{color:var(--color-accent-200);}
  .conn-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);} .conn.out .conn-dot{background:var(--gap);}
  .connpop{position:fixed;top:60px;right:16px;width:288px;background:var(--color-surface);border:1px solid var(--color-divider);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);padding:16px;z-index:30;}
  .connpop code{font-family:var(--font-mono);font-size:12px;background:var(--color-bg);border:1px solid var(--color-divider);border-radius:6px;padding:1px 6px;}
  .menu{position:absolute;top:44px;left:0;min-width:230px;background:var(--color-surface);border:1px solid var(--color-divider);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);padding:6px;z-index:20;display:none;}
  .menu.on{display:block;} .menu .mi{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:13px;} .menu .mi:hover{background:color-mix(in srgb,var(--color-text) 6%,transparent);} .menu .mdot{width:8px;height:8px;border-radius:50%;}

  /* body layouts */
  #body{height:calc(100vh - 56px);overflow:hidden;}
  .obmain{height:100%;overflow:auto;}
  .pbody{display:grid;grid-template-columns:224px 1fr;grid-template-rows:1fr 46px;grid-template-areas:"rail main" "strip strip";height:100%;}
  .rail{grid-area:rail;background:var(--color-surface);border-right:1px solid var(--color-divider);padding:var(--space-3) var(--space-2);display:flex;flex-direction:column;gap:2px;overflow:auto;}
  .navitem{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:999px;cursor:pointer;font-size:14px;color:var(--color-text);} .navitem svg{opacity:.72;flex:none;} .navitem .cnt{margin-left:auto;font-size:11px;color:color-mix(in srgb,var(--color-text) 45%,transparent);}
  .navitem:hover{background:color-mix(in srgb,var(--color-text) 6%,transparent);} .navitem[aria-current="page"]{background:var(--color-accent);color:var(--color-bg);} .navitem[aria-current="page"] svg{opacity:1;} .navitem[aria-current="page"] .cnt{color:color-mix(in srgb,var(--color-bg) 80%,transparent);}
  .main{grid-area:main;overflow:auto;position:relative;}
  .vhead{display:flex;align-items:flex-end;gap:var(--space-3);padding:var(--space-6) var(--space-6) var(--space-3);} .vhead h1{font-size:30px;} .vbody{padding:0 var(--space-6) var(--space-8);}
  .stats{display:flex;gap:var(--space-3);flex-wrap:wrap;margin-bottom:var(--space-4);} .stat{background:var(--color-surface);border-radius:var(--radius-lg);padding:14px 18px;min-width:112px;} .stat .n{font-family:var(--font-heading);font-size:26px;line-height:1;} .stat .l{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:color-mix(in srgb,var(--color-text) 52%,transparent);margin-top:6px;}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:var(--space-3);flex-wrap:wrap;} .chip{font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid var(--color-divider);cursor:pointer;background:var(--color-surface);} .chip[aria-pressed="true"]{background:var(--color-accent);color:var(--color-bg);border-color:transparent;}
  .tablewrap{background:var(--color-surface);border-radius:var(--radius-lg);overflow:auto;max-height:calc(100vh - 340px);}
  .strip{grid-area:strip;display:flex;align-items:center;gap:var(--space-4);padding:0 var(--space-4);background:var(--color-surface);border-top:1px solid var(--color-divider);font-size:12px;overflow:hidden;} .strip .seg2{display:flex;align-items:center;gap:8px;white-space:nowrap;} .strip .sep{width:1px;height:20px;background:var(--color-divider);}
  .worker{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;background:var(--color-bg);border:1px solid var(--color-divider);} .wk-dot{width:7px;height:7px;border-radius:50%;} .bar{height:6px;width:100px;border-radius:999px;background:color-mix(in srgb,var(--color-text) 12%,transparent);overflow:hidden;} .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--color-accent),var(--color-accent-2));} .ticker{flex:1;overflow:hidden;} .ticker .ev{color:color-mix(in srgb,var(--color-text) 62%,transparent);} .ev .mono{color:var(--color-accent);}

  /* onboarding */
  .wrap{max-width:1120px;margin:0 auto;padding:var(--space-8) var(--space-6);}
  .phead{display:flex;align-items:flex-end;gap:var(--space-4);margin-bottom:var(--space-6);} .phead h1{font-size:36px;}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--space-3);}
  .pcard{background:var(--color-surface);border-radius:var(--radius-lg);padding:var(--space-4);cursor:pointer;display:flex;flex-direction:column;gap:10px;transition:transform .12s,box-shadow .12s;} .pcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
  .pcard .row1{display:flex;align-items:center;gap:10px;} .avatar{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:var(--color-accent);color:var(--color-bg);font-family:var(--font-heading);font-size:18px;flex:none;} .pcard h3{font-size:19px;} .src{font-family:var(--font-mono);font-size:11.5px;color:color-mix(in srgb,var(--color-text) 55%,transparent);}
  .chips{display:flex;gap:6px;flex-wrap:wrap;} .pmeta{display:flex;align-items:center;gap:14px;font-size:12px;} .cbar{height:6px;border-radius:999px;background:color-mix(in srgb,var(--color-text) 12%,transparent);overflow:hidden;flex:1;} .cbar i{display:block;height:100%;background:linear-gradient(90deg,var(--color-accent),var(--color-accent-2));}
  .status{display:inline-flex;align-items:center;gap:6px;font-size:11px;} .sdot{width:8px;height:8px;border-radius:50%;}
  .pcard.new{border:1.5px dashed var(--color-divider);background:transparent;align-items:center;justify-content:center;text-align:center;min-height:190px;color:var(--color-accent);gap:8px;} .pcard.new:hover{border-color:var(--color-accent);background:color-mix(in srgb,var(--color-accent) 5%,transparent);}
  .empty{text-align:center;padding:var(--space-8) 0;max-width:520px;margin:0 auto;} .glyph{width:92px;height:92px;margin:0 auto var(--space-4);}
  .newgrid{display:grid;grid-template-columns:1.1fr .9fr;gap:var(--space-6);align-items:start;} @media(max-width:900px){.newgrid{grid-template-columns:1fr;}}
  .steps{display:flex;gap:10px;margin-bottom:var(--space-6);font-size:12px;} .steps .s{display:flex;align-items:center;gap:7px;color:color-mix(in srgb,var(--color-text) 45%,transparent);} .steps .s .n{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--color-divider);display:grid;place-items:center;font-family:var(--font-heading);font-size:12px;} .steps .s.on{color:var(--color-text);} .steps .s.on .n{background:var(--color-accent);color:var(--color-bg);border-color:transparent;} .steps .s.done .n{background:var(--ok);color:var(--color-bg);border-color:transparent;}
  .kvp{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:7px 0;border-bottom:1px solid color-mix(in srgb,var(--color-text) 7%,transparent);} .kvp .k{color:color-mix(in srgb,var(--color-text) 55%,transparent);} .kvp b{font-family:var(--font-heading);font-weight:400;}
  .profilebox{opacity:0;max-height:0;overflow:hidden;transition:opacity .3s;} .profilebox.on{opacity:1;max-height:none;}

  /* recon (scan) */
  .recon{display:grid;grid-template-columns:1fr 372px;height:100%;} @media(max-width:1000px){.recon{grid-template-columns:1fr;}.reconside{display:none;}}
  .reconmain{position:relative;overflow:hidden;background:radial-gradient(120% 120% at 30% 0%,color-mix(in srgb,var(--color-accent) 7%,transparent),transparent 55%),radial-gradient(100% 100% at 85% 100%,color-mix(in srgb,var(--color-accent-2) 8%,transparent),transparent 50%),var(--color-bg);}
  #scan{position:absolute;inset:0;width:100%;height:100%;} .node text{font-family:var(--font-heading);pointer-events:none;fill:var(--color-text);}
  .reconhud{position:absolute;left:var(--space-6);top:var(--space-4);z-index:2;} .reconhud .big{font-family:var(--font-heading);font-size:26px;} .reconhud .lbl{font-size:12px;}
  .reconside{background:var(--color-surface);border-left:1px solid var(--color-divider);padding:var(--space-4);overflow:auto;display:flex;flex-direction:column;gap:var(--space-4);}
  .lead{display:flex;align-items:center;gap:10px;} .leaddot{width:10px;height:10px;border-radius:50%;background:var(--active);animation:pulse 1.8s infinite;}

  .bigbar{height:10px;border-radius:999px;background:color-mix(in srgb,var(--color-text) 12%,transparent);overflow:hidden;} .bigbar i{display:block;height:100%;background:linear-gradient(90deg,var(--color-accent),var(--color-accent-2));transition:width .5s;}
  .tick{font-size:11.5px;color:color-mix(in srgb,var(--color-text) 60%,transparent);border-left:2px solid var(--color-divider);padding-left:10px;margin-top:2px;} .tick .mono{color:var(--color-accent);}
  .gate{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(460px,90%);text-align:center;background:color-mix(in srgb,var(--color-surface) 96%,transparent);backdrop-filter:blur(6px);border:1px solid var(--color-divider);border-radius:var(--radius-lg);padding:var(--space-6);box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .4s;z-index:5;} .gate.on{opacity:1;pointer-events:auto;}

  /* brain view */
  .brain{position:absolute;inset:0;overflow:hidden;background:radial-gradient(120% 120% at 30% 0%,color-mix(in srgb,var(--color-accent) 6%,transparent),transparent 55%),radial-gradient(100% 100% at 90% 100%,color-mix(in srgb,var(--color-accent-2) 7%,transparent),transparent 50%),var(--color-bg);}

  function homeView(){
    if(empty) return `<div class="obmain"><div class="wrap"><div class="empty"><svg class="glyph" viewBox="0 0 96 96" fill="none" stroke="var(--color-accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="48" cy="48" r="10"/><circle cx="22" cy="26" r="6"/><circle cx="74" cy="26" r="6"/><circle cx="22" cy="70" r="6"/><circle cx="74" cy="70" r="6"/><path d="M40 42 27 31M56 42 69 31M40 54 27 65M56 54 69 65" opacity=".7"/></svg><h1 style="font-size:32px">No codebases yet</h1><p class="muted" style="font-size:15px;margin:10px 0 22px">Point Codengram at a repository and it builds a persistent second brain — features, interfaces, identity, data flows — that any AI can use without relearning the code.</p><button class="btn btn-primary btn-lg" onclick="goNew()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75"><path d="M12 5v14M5 12h14"/></svg>Add your first repository</button><div style="margin-top:16px"><button class="btn btn-ghost" onclick="empty=false;render()">See it with sample projects →</button></div></div></div></div>`;
    return `<div class="obmain"><div class="wrap"><div class="phead"><div><h1>Your codebases</h1><p class="muted">Each is a scanned repository with its own brain. Open one, or add another — switch anytime.</p></div><span class="spacer"></span><button class="btn btn-secondary" onclick="empty=true;render()">Empty state</button><button class="btn btn-primary" onclick="goNew()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75"><path d="M12 5v14M5 12h14"/></svg>New project</button></div><div class="pgrid">${PROJECTS.map(p=>{const[c,l]=smap[p.status];return `<div class="pcard" onclick="cardClick('${esc(p.name)}','${p.status}')"><div class="row1"><div class="avatar">${p.name[0].toUpperCase()}</div><div style="min-width:0"><h3>${esc(p.name)}</h3><div class="src">${esc(p.src)}</div></div></div><div class="chips">${p.lang.map(x=>`<span class="tag tag-neutral">${x}</span>`).join('')}</div><div class="pmeta"><span class="status"><span class="sdot" style="background:${c}"></span>${l}</span><span class="muted nums">${p.feat} features</span><span class="muted">${p.when}</span></div><div style="display:flex;align-items:center;gap:10px;margin-top:2px"><span class="cbar"><i style="width:${p.cov}%"></i></span><b class="nums" style="font-size:12px;font-family:var(--font-heading)">${p.cov}%</b></div></div>`;}).join('')}<div class="pcard new" onclick="goNew()"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg><b style="font-family:var(--font-heading);font-size:16px">New project</b><span class="muted" style="font-size:12px">Local folder or Git repo</span></div></div></div></div>`;
  }
  function newView(){return `<div class="obmain"><div class="wrap" style="max-width:600px">
    <button class="btn btn-ghost" onclick="goHome()" style="margin-bottom:18px;color:var(--color-accent);padding-inline:6px">← Projects</button>
    <div class="card"><h2 style="font-size:26px;margin-bottom:4px">Add a repository</h2>
      <p class="muted" style="font-size:13px;margin-bottom:20px">Point Codengram at a local repository and it builds its second brain. Source is read-only — your code is never modified.</p>
      <div class="field" style="margin-bottom:20px"><label>Repository path</label><div style="display:flex;gap:8px"><input class="input big mono" value="/Users/jay/code/acme-commerce" placeholder="/path/to/your/repo"><button class="btn btn-secondary" style="flex:none">Browse…</button></div></div>
      <button class="btn btn-primary btn-lg btn-block" style="width:100%" onclick="startRecon('acme-commerce')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75"><path d="m5 3 14 9-14 9z"/></svg>Recon</button>
      <p class="muted" style="font-size:11.5px;text-align:center;margin-top:12px">Snapshots the source, profiles it, and maps the whole codebase. Recon only — never assesses security.</p>
    </div></div></div>`;}

  // ── project shell (rail + main + strip) ─────────────────────────────────────────────────
  const ic={brain:'<circle cx="12" cy="12" r="3"/><circle cx="5" cy="6" r="1.6"/><circle cx="19" cy="6" r="1.6"/><circle cx="5" cy="18" r="1.6"/><circle cx="19" cy="18" r="1.6"/><path d="m9.7 10.4-3-3M14.3 10.4l3-3M9.7 13.6l-3 3M14.3 13.6l3 3"/>',features:'<rect x="3" y="4" width="18" height="4" rx="1.5"/><rect x="3" y="10" width="18" height="4" rx="1.5"/><rect x="3" y="16" width="18" height="4" rx="1.5"/>',architecture:'<rect x="4" y="4" width="6" height="6" rx="1.5"/><rect x="14" y="4" width="6" height="6" rx="1.5"/><rect x="9" y="14" width="6" height="6" rx="1.5"/><path d="M7 10v2h10v-2M12 12v2"/>',identity:'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>',interfaces:'<path d="M4 7h16M4 12h16M4 17h10"/><circle cx="19" cy="17" r="2"/>',dataflows:'<path d="M3 6h5l2 3h11"/><path d="M3 6v12h18V9"/><path d="m14 13 3 3-3 3"/>',coverage:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M9 9v11"/>',activity:'<path d="M12 7v5l3 2"/><circle cx="12" cy="12" r="9"/>',exports:'<path d="M4 4h10l6 6v10H4z"/><path d="M14 4v6h6"/>'};
  const NAV=[['brain','Brain',''],['features','Features','42'],['architecture','Architecture',''],['identity','Identity','9'],['interfaces','Interfaces','188'],['dataflows','Data Flows',''],['coverage','Coverage','86%'],['activity','Activity',''],['exports','Exports','']];
  function projectShell(){
    const rail=`<nav class="rail">${NAV.map(([k,l,c])=>`<div class="navitem" ${k===view?'aria-current="page"':''} onclick="setView('${k}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75">${ic[k]}</svg><span>${l}</span>${c?`<span class="cnt nums">${c}</span>`:''}</div>`).join('')}<div style="margin-top:auto;padding:12px;"><div class="tag tag-accent-2" style="width:100%;justify-content:center;">Recon only</div></div></nav>`;
    const strip=`<footer class="strip"><div class="seg2"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="2.75"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/></svg><b style="font-family:var(--font-heading)">Lead</b> planning · v2</div><div class="sep"></div><div class="seg2"><span class="muted">Workers</span><span class="worker"><span class="wk-dot" style="background:var(--active)"></span>Identity</span><span class="worker"><span class="wk-dot" style="background:var(--active)"></span>Payments</span><span class="worker"><span class="wk-dot" style="background:var(--stale)"></span>+7 queued</span></div><div class="sep"></div><div class="seg2"><span class="muted">Coverage</span><span class="bar"><i style="width:86%"></i></span><b class="nums">86%</b></div><div class="sep"></div><div class="seg2 ticker"><span class="ev"><span class="mono">08:41:12</span> &nbsp;worker <b>Identity</b> mapped <b>OAuth sign-in</b> → +14 nodes</span></div></footer>`;
    const mainInner = view==='brain' ? brainView()
      : (view==='features' && featOpen) ? featureDetailView(featOpen)
      : `<div>${VIEWS[view]()}</div>`;
    return `<div class="pbody">${rail}<main class="main">${mainInner}</main>${strip}</div>`;
  }

  // ── top-bar middle (context-aware) ──────────────────────────────────────────────────────
  function topMid(){
    const t=$('topmid');
    if(mode==='project'){
      t.innerHTML=`<button class="switcher" id="sw"><b>${esc(curProject)}</b><span class="muted">· 8f2c1a</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75"><path d="m6 9 6 6 6-6"/></svg><div class="menu" id="pmenu">${PROJECTS.map(p=>{const[c]=smap[p.status];return `<div class="mi" onclick="event.stopPropagation();cardClick('${esc(p.name)}','${p.status}')"><span class="mdot" style="background:${c}"></span>${esc(p.name)}<span class="spacer"></span><span class="muted nums" style="font-size:11px">${p.cov}%</span></div>`;}).join('')}<div class="mi" onclick="event.stopPropagation();goHome()" style="border-top:1px solid var(--color-divider);margin-top:4px;color:var(--color-accent)">All projects…</div></div></button>
        <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input class="input" placeholder="Search the brain…"></div>
        <span class="spacer"></span>${connChip()}<span class="recon-pill" onclick="startRecon(curProject)"><span class="rdot"></span>Recon · mapping <b class="nums">3</b>/10</span>
        <button class="btn btn-secondary btn-sm"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75"><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M5 21h14"/></svg>Export</button>
        <button class="btn btn-icon btn-secondary" id="themeBtn" title="Theme"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></button>`;
      const sw=$('sw'); sw.onclick=()=>$('pmenu').classList.toggle('on');
      document.addEventListener('click',e=>{if(!sw.contains(e.target))$('pmenu')&&$('pmenu').classList.remove('on');},{once:true});
    } else {
      t.innerHTML=`<button class="switcher" onclick="goHome()"><b>Projects</b></button><span class="spacer"></span>
        ${connChip()}
        ${mode!=='home'?`<button class="btn btn-secondary btn-sm" onclick="goHome()">Cancel</button>`:''}
        <button class="btn btn-icon btn-secondary" id="themeBtn" title="Theme"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></button>
        <button class="btn btn-primary" onclick="goNew()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.75"><path d="M12 5v14M5 12h14"/></svg>New project</button>`;
    }
    const tb=$('themeBtn'); if(tb) tb.onclick=()=>{const dark=root.getAttribute('data-theme')==='dark'||(root.getAttribute('data-theme')!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches);root.setAttribute('data-theme',dark?'light':'dark');if(view==='brain'&&mode==='project')drawBrain();if(mode==='recon')drawScan();};
  }

  // ── navigation API ──────────────────────────────────────────────────────────────────────
  window.goHome=()=>{mode='home';render();};
  window.goNew=()=>{mode='new';render();};
  window.startRecon=startRecon;
  window.openBrain=(name)=>{curProject=name;mode='project';view='brain';render();};
  window.cardClick=(name,status)=>{ if(status==='mapping'){ startRecon(name); } else { openBrain(name); } };
  window.setView=v=>{featOpen=null;view=v;render();};

  function render(){
    topMid();
    // Claude connection popover — read-only status; no login button, no credential inspection (Agent SDK owns auth)
    $('connpop').innerHTML = connOut
      ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="conn-dot" style="background:var(--gap)"></span><b style="font-family:var(--font-heading);font-size:15px">Claude login required</b></div><p class="muted" style="font-size:13px;margin:0 0 12px">Codengram uses your local Claude subscription. Run <code>claude</code>, then <code>/login</code>, and retry.</p><button class="btn btn-primary btn-block" style="width:100%" onclick="toggleConn()">Retry</button>`
      : '';
    const b=$('body');
    if(mode==='project'){ b.innerHTML=projectShell();
      if(view==='brain'){ const seed=gf.find(f=>f.label==='OAuth sign-in'); sel=seed.id; binsp(seed); requestAnimationFrame(()=>{drawBrain(); new ResizeObserver(()=>{if(view==='brain'&&mode==='project')drawBrain();}).observe($('net'));}); }
      b.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{c.parentElement.querySelectorAll('.chip').forEach(x=>x.removeAttribute('aria-pressed'));c.setAttribute('aria-pressed','true');});
    }
    else if(mode==='recon'){ b.innerHTML=reconView(); requestAnimationFrame(()=>{drawScan();pside();new ResizeObserver(()=>{if(mode==='recon')drawScan();}).observe($('scan'));}); }
    else if(mode==='new') b.innerHTML=newView();
    else b.innerHTML=homeView();
  }
  render();
})();
</script>
