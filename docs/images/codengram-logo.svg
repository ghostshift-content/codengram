<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240" font-family="Georgia, 'Times New Roman', serif" role="img" aria-label="Codengram — map any codebase, export the whole map">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c67139"/>
      <stop offset="1" stop-color="#7a8a5e"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="896" height="236" rx="30" fill="#f5ead8" stroke="#e4d6bf" stroke-width="2"/>

  <!-- code-map constellation: nodes connected into a map -->
  <g transform="translate(56,32)" stroke-linecap="round">
    <g stroke="url(#edge)" stroke-width="2.4" opacity="0.7">
      <line x1="88" y1="88" x2="26" y2="30"/>
      <line x1="88" y1="88" x2="150" y2="22"/>
      <line x1="88" y1="88" x2="168" y2="104"/>
      <line x1="88" y1="88" x2="120" y2="158"/>
      <line x1="88" y1="88" x2="24" y2="140"/>
      <line x1="88" y1="88" x2="12" y2="70"/>
      <line x1="26" y1="30" x2="150" y2="22" opacity="0.5"/>
      <line x1="168" y1="104" x2="120" y2="158" opacity="0.5"/>
    </g>
    <!-- satellite nodes -->
    <circle cx="26"  cy="30"  r="8" fill="#7a8a5e"/>
    <circle cx="150" cy="22"  r="8" fill="#c67139"/>
    <circle cx="168" cy="104" r="8" fill="#7a8a5e"/>
    <circle cx="120" cy="158" r="8" fill="#c67139"/>
    <circle cx="24"  cy="140" r="8" fill="#7a8a5e"/>
    <circle cx="12"  cy="70"  r="6.5" fill="#c67139"/>
    <!-- central node with a soft scan ring -->
    <circle cx="88" cy="88" r="15" fill="#c67139"/>
    <circle cx="88" cy="88" r="15" fill="none" stroke="#c67139" stroke-width="2" opacity="0.6">
      <animate attributeName="r" values="15;34;15" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0;0.55" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="88" cy="88" r="6" fill="#f5ead8"/>
    <!-- gentle twinkle -->
    <g fill="#f5ead8">
      <circle cx="150" cy="22"  r="2.6"><animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="0.2s" repeatCount="indefinite"/></circle>
      <circle cx="24"  cy="140" r="2.6"><animate attributeName="opacity" values="0;1;0" dur="3.1s" begin="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="168" cy="104" r="2.6"><animate attributeName="opacity" values="0;1;0" dur="2.6s" begin="1.9s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- wordmark -->
  <text x="290" y="118" font-size="70" letter-spacing="-1.5" fill="#201e1d">Codengram</text>
  <text x="293" y="156" font-size="22" font-family="'Figtree', system-ui, -apple-system, 'Segoe UI', sans-serif" fill="#8a7a66">Map any codebase — export the whole map.</text>

  <!-- what it maps -->
  <g transform="translate(293,182)" font-family="'Figtree', system-ui, sans-serif" font-size="12.5" font-weight="600">
    <g fill="#a85a29">
      <rect x="0"   y="0" width="76"  height="24" rx="12" fill="#f2ddca"/><text x="14" y="16">features</text>
      <rect x="86"  y="0" width="86"  height="24" rx="12" fill="#f2ddca"/><text x="100" y="16">endpoints</text>
    </g>
    <g fill="#5f6d47">
      <rect x="182" y="0" width="118" height="24" rx="12" fill="#e2e8d4"/><text x="196" y="16">authorization</text>
      <rect x="310" y="0" width="96"  height="24" rx="12" fill="#e2e8d4"/><text x="324" y="16">data flows</text>
    </g>
  </g>
</svg>
